<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>A Special Surprise for Simple</title>
    <style>
        :root { --gold: #FFD700; --velvet: #004d40; --cream: #fdfaf6; }
        
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; 
            background: radial-gradient(circle, #00251a, #000000);
        }

        body { 
            display: flex; justify-content: center; align-items: center; 
            font-family: 'Georgia', serif; perspective: 1500px; 
        }

        #card { width: 90vw; max-width: 450px; height: 80vh; max-height: 600px; position: relative; transform-style: preserve-3d; box-shadow: 0 50px 100px rgba(0,0,0,0.8); }

        .door { position: absolute; width: 50%; height: 100%; background: var(--velvet); border: 2px solid var(--gold); z-index: 100; transition: transform 2s cubic-bezier(0.45, 0.05, 0.55, 0.95); transform-origin: left; display: flex; align-items: center; justify-content: center; color: var(--gold); cursor: pointer; backface-visibility: hidden; font-weight: bold; }
        .door.right { right: 0; transform-origin: right; border-left: none; }
        .door.left { left: 0; transform-origin: left; border-right: none; }
        .open .door.left { transform: rotateY(-140deg); }
        .open .door.right { transform: rotateY(140deg); }

        #stage { position: absolute; width: 100%; height: 100%; background: var(--cream); z-index: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; border: 1px solid var(--gold); }

        /* REPLACEMENT STEP 1 & 2: Updated CSS for new flower image */
        .petal { 
            position: absolute; 
            background: none; /* Removed white background */
            background-size: contain; /* Important for fitting the image */
            background-repeat: no-repeat;
            opacity: 0; 
            z-index: 150; 
            pointer-events: none; 
            box-shadow: none; /* Removed cream tint */
        }
        /* DELETED: .petal::after section has been removed to get rid of the yellow dot */

        .cake { width: 220px; height: 130px; background: #5d3a1a; border-radius: 10px; position: relative; box-shadow: 0 15px 30px rgba(0,0,0,0.3); margin-top: 60px; transition: 1s ease; }
        .frosting { position: absolute; top: -15px; width: 100%; height: 40px; background: #fff; border-radius: 50% 50% 0 0; box-shadow: 0 5px 0 #eee; }
        .candle { width: 10px; height: 45px; background: linear-gradient(to bottom, #d4af37, #f1c40f); position: relative; display: inline-block; margin: 0 12px; cursor: pointer; top: -55px; border-radius: 2px; transition: opacity 0.5s; }
        .flame { position: absolute; top: -18px; left: 50%; transform: translateX(-50%); width: 14px; height: 22px; background: radial-gradient(#fff, #ffae00); border-radius: 50% 50% 20% 20%; animation: flicker 0.15s infinite; filter: drop-shadow(0 0 5px orange); }
        
        @keyframes flicker { 0% { transform: translateX(-50%) scale(1); } 50% { transform: translateX(-52%) scale(1.15); opacity: 0.9; } 100% { transform: translateX(-48%) scale(1); } }
        .extinguished .flame { display: none; }
        
        .fume { position: absolute; top: -25px; left: 50%; width: 5px; height: 5px; background: rgba(150,150,150,0.6); border-radius: 50%; opacity: 0; pointer-events: none; }
        .extinguished .fume { animation: smokeRise 2s ease-out forwards; }
        @keyframes smokeRise { 0% { opacity: 0.8; transform: translate(-50%, 0) scale(1); } 100% { opacity: 0; transform: translate(-50%, -60px) scale(4); } }

        #side-prompt { position: absolute; right: -250px; top: 15%; width: 150px; transition: 1s cubic-bezier(0.175, 0.885, 0.32, 1.275); font-style: italic; color: var(--velvet); font-weight: bold; background: rgba(212, 175, 55, 0.2); padding: 10px; border-radius: 8px; font-size: 0.9rem; }
        .open #side-prompt { right: 10px; }

        #eat-prompt { display: none; margin-top: 30px; font-weight: bold; color: #700; cursor: pointer; animation: heartbeat 1.5s infinite; font-size: 1.2rem; }
        @keyframes heartbeat { 0% { transform: scale(1); } 10% { transform: scale(1.1); } 20% { transform: scale(1); } }

        #cloth { position: absolute; top: -100%; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, #800, #400); z-index: 200; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--gold); transition: top 2.5s cubic-bezier(0.45, 0.05, 0.55, 0.95); border-bottom: 15px solid var(--gold); box-shadow: 0 10px 50px rgba(0,0,0,0.9); }
        #cloth.roll-down { top: 0; }
        
        .video-box { display: flex; gap: 10px; width: 95%; margin-top: 20px; }
        video { width: 50%; border: 2px solid var(--gold); border-radius: 5px; background: black; }

        #replay-btn { margin-top: 20px; background: var(--gold); color: var(--velvet); border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; opacity: 0; transition: 1s; }

        #ribbon-container { position: absolute; width: 100%; height: 100%; z-index: 200; display: flex; justify-content: center; align-items: center; transition: opacity 0.8s ease-in-out; }
        .ribbon-half { position: absolute; width: 50%; height: 40px; background: var(--gold); box-shadow: 0 4px 10px rgba(0,0,0,0.3); transition: transform 1s cubic-bezier(0.4, 0, 0.2, 1); }
        .ribbon-left { left: 0; }
        .ribbon-right { right: 0; }
        .knot { width: 60px; height: 60px; background: var(--gold); border: 3px solid #fff; border-radius: 50%; z-index: 210; display: flex; justify-content: center; align-items: center; cursor: pointer; box-shadow: 0 0 15px rgba(0,0,0,0.5); transition: transform 0.5s; color: var(--velvet); font-weight: bold; font-size: 0.8rem; }
        .untied .ribbon-left { transform: translateX(-100%); }
        .untied .ribbon-right { transform: translateX(100%); }
        .untied .knot { transform: scale(0); opacity: 0; }
    </style>
</head>
<body>

<div id="card">
    <div id="ribbon-container" onclick="untieRibbon()">
        <div class="ribbon-half ribbon-left"></div>
        <div class="knot">OPEN</div>
        <div class="ribbon-half ribbon-right"></div>
    </div>

    <div class="door left">FOR</div>
    <div class="door right">SIMPLE</div>

    <div id="stage">
        <div id="side-prompt">"make a wish and blow off the candles (click them)"</div>
        
        <div class="cake" id="cakeNode">
            <div class="frosting"></div>
            <div id="candle-container">
                <div class="candle" onclick="extinguish()"><div class="flame"></div><div class="fume"></div></div>
                <div class="candle" onclick="extinguish()"><div class="flame"></div><div class="fume"></div></div>
                <div class="candle" onclick="extinguish()"><div class="flame"></div><div class="fume"></div></div>
            </div>
        </div>

        <div id="eat-prompt" onclick="revealFinale()">eat my darling (click here)</div>
    </div>

    <div id="cloth">
        <h2 style="margin:0; letter-spacing: 2px; font-size: 1.2rem;">HAPPY BIRTHDAY</h2>
        <h1 style="margin:0; font-size: 2.5rem; text-shadow: 2px 2px 10px rgba(0,0,0,0.5);">SIMPLE</h1>
        <h2 style="margin:0; font-size: 2.5rem; text-shadow: 2px 2px 10px rgba(0,0,0,0.5);">My Angle & My Bubu darling </h2>
        <div class="video-box">
            <video id="v1" src="gg2.mp4" loop playsinline muted></video>
            <video id="v2" src="gg3.mp4" loop playsinline muted></video>
        </div>
        <button id="replay-btn" onclick="location.reload()">Replay Card</button>
    </div>
</div>

<audio id="bdaySong" src="birthday.mp3"></audio>

<script>
    let musicStarted = false;

    function untieRibbon() {
        document.getElementById('ribbon-container').classList.add('untied');
        setTimeout(() => {
            document.getElementById('ribbon-container').style.display = 'none';
            openCard();
        }, 800);
    }

    function openCard() {
        document.getElementById('card').classList.add('open');
        createJasmineShower();
    }

    /* REPLACEMENT STEP 3: Updated function to use new image */
    function createJasmineShower() {
        const flowerImage = "jasmine_flower.png"; // Set your correct image filename here

        for (let i = 0; i < 50; i++) {
            setTimeout(() => {
                const petal = document.createElement('div');
                petal.className = 'petal';
                
                // Use the flower image as the background
                petal.style.backgroundImage = `url(${flowerImage})`;

                // Adjust size for better visibility, making them slightly larger
                const sizeNum = Math.random() * 25 + 15; // Range: 15px - 40px
                petal.style.width = sizeNum + 'px';
                petal.style.height = sizeNum + 'px';
                
                petal.style.left = Math.random() * 100 + 'vw';
                petal.style.top = '-50px'; // Start above screen
                document.body.appendChild(petal);

                // Define the falling animation
                const duration = Math.random() * 4 + 3; // Range: 3s - 7s
                const startRotation = Math.random() * 360; // Random starting angle
                const endRotation = startRotation + Math.random() * 720; // Full random spin

                petal.animate([
                    { transform: `translateY(0) rotate(${startRotation}deg)`, opacity: 0.9 },
                    { transform: `translateY(110vh) rotate(${endRotation}deg)`, opacity: 0 }
                ], { duration: duration * 1000, easing: 'linear' });

                // Remove the petal after animation finishes
                setTimeout(() => petal.remove(), duration * 1000);
            }, i * 120); // Delay between each flower falling
        }
    }

    function extinguish() {
        if (musicStarted) return;
        musicStarted = true;

        const candles = document.querySelectorAll('.candle');
        candles.forEach(c => c.classList.add('extinguished'));
        document.getElementById('side-prompt').style.opacity = '0';
        
        const audio = document.getElementById('bdaySong');
        audio.play().catch(() => console.log("Audio playing..."));

        setTimeout(() => {
            document.getElementById('cakeNode').style.transform = "translateY(-20px) scale(1.05)";
            document.getElementById('eat-prompt').style.display = 'block';
        }, 3000);
    }

    function revealFinale() {
        document.getElementById('cloth').classList.add('roll-down');
        const v1 = document.getElementById('v1');
        const v2 = document.getElementById('v2');
        
        v1.play();
        v2.play();

        setTimeout(() => {
            const btn = document.getElementById('replay-btn');
            btn.style.opacity = '1';
            btn.style.pointerEvents = 'auto';
        }, 10000);
    }
</script>

</body>
</html>
