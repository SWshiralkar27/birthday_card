<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>A Special Surprise for Simple</title>
    <style>
        html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow-x: hidden; /* Prevents side-scrolling */
}

.full-screen-section {
  height: 100vh; /* Forces the section to be exactly the height of the phone screen */
  width: 100vw;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}
        :root { --gold: #FFD700; --velvet: #004d40; --cream: #fdfaf6; --jasmine: #ffffff; }
        body { background: radial-gradient(circle, #00251a, #000000); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: 'Georgia', serif; perspective: 1500px; overflow: hidden; }

        #card { width: 450px; height: 600px; position: relative; transform-style: preserve-3d; box-shadow: 0 50px 100px rgba(0,0,0,0.8); }

        /* Elegant Leaf Doors */
        .door { position: absolute; width: 50%; height: 100%; background: var(--velvet); border: 2px solid var(--gold); z-index: 100; transition: transform 2s cubic-bezier(0.45, 0.05, 0.55, 0.95); transform-origin: left; display: flex; align-items: center; justify-content: center; color: var(--gold); cursor: pointer; backface-visibility: hidden; }
        .door.right { right: 0; transform-origin: right; border-left: none; }
        .door.left { left: 0; transform-origin: left; border-right: none; }
        .open .door.left { transform: rotateY(-140deg); }
        .open .door.right { transform: rotateY(140deg); }

        /* Interior Stage */
        #stage { position: absolute; width: 100%; height: 100%; background: var(--cream); z-index: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; border: 1px solid var(--gold); }

        /* Jasmine Petal Styling */
        .petal { position: absolute; background: var(--jasmine); border-radius: 100% 2% 100% 2%; opacity: 0; z-index: 150; pointer-events: none; box-shadow: 0 0 5px rgba(255,255,255,0.8); }

        /* Cake & Interactive Elements */
        .cake { width: 220px; height: 130px; background: #5d3a1a; border-radius: 10px; position: relative; box-shadow: 0 15px 30px rgba(0,0,0,0.3); margin-top: 60px; transition: 1s ease; }
        .frosting { position: absolute; top: -15px; width: 100%; height: 40px; background: #fff; border-radius: 50% 50% 0 0; box-shadow: 0 5px 0 #eee; }
        .candle { width: 10px; height: 45px; background: linear-gradient(to bottom, #d4af37, #f1c40f); position: relative; display: inline-block; margin: 0 12px; cursor: pointer; top: -55px; border-radius: 2px; }
        .flame { position: absolute; top: -18px; left: 50%; transform: translateX(-50%); width: 14px; height: 22px; background: radial-gradient(#fff, #ffae00); border-radius: 50% 50% 20% 20%; animation: flicker 0.15s infinite; filter: drop-shadow(0 0 5px orange); }
        
        @keyframes flicker { 0% { transform: translateX(-50%) scale(1); } 50% { transform: translateX(-52%) scale(1.15); opacity: 0.9; } 100% { transform: translateX(-48%) scale(1); } }
        .extinguished .flame { display: none; }
        
        /* Fumes/Smoke */
        .fume { position: absolute; top: -25px; left: 50%; width: 5px; height: 5px; background: rgba(150,150,150,0.6); border-radius: 50%; opacity: 0; pointer-events: none; }
        .extinguished .fume { animation: smokeRise 2s ease-out forwards; }
        @keyframes smokeRise { 0% { opacity: 0.8; transform: translate(-50%, 0) scale(1); } 100% { opacity: 0; transform: translate(-50%, -60px) scale(4); } }

        /* Side Text Prompt */
        #side-prompt { position: absolute; right: -250px; top: 25%; width: 180px; transition: 1s cubic-bezier(0.175, 0.885, 0.32, 1.275); font-style: italic; color: var(--velvet); font-weight: bold; background: rgba(212, 175, 55, 0.2); padding: 10px; border-radius: 8px; }
        .open #side-prompt { right: 20px; }

        #eat-prompt { display: none; margin-top: 30px; font-weight: bold; color: #700; cursor: pointer; animation: heartbeat 1.5s infinite; font-size: 1.2rem; }
        @keyframes heartbeat { 0% { transform: scale(1); } 10% { transform: scale(1.1); } 20% { transform: scale(1); } }

        /* The Cloth Backdrop Reveal */
        #cloth { position: absolute; top: -100%; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, #800, #400); z-index: 200; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--gold); transition: top 2.5s cubic-bezier(0.45, 0.05, 0.55, 0.95); border-bottom: 15px solid var(--gold); box-shadow: 0 10px 50px rgba(0,0,0,0.9); }
        #cloth.roll-down { top: 0; }
        
        .video-box { display: flex; gap: 15px; width: 92%; margin-top: 30px; }
        video { width: 50%; border: 3px solid var(--gold); border-radius: 5px; background: black; }

        #replay-btn { margin-top: 25px; background: var(--gold); color: var(--velvet); border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; opacity: 0; transition: 1s; }

        /* The Ribbon and Knot */
        #ribbon-container {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 200;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s ease-in-out;
        }

        .ribbon-half {
            position: absolute;
            width: 50%;
            height: 40px;
            background: var(--gold);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: transform 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .ribbon-left { left: 0; }
        .ribbon-right { right: 0; }

        .knot {
            width: 60px;
            height: 60px;
            background: var(--gold);
            border: 3px solid #fff;
            border-radius: 50%;
            z-index: 210;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            transition: transform 0.5s;
            color: var(--velvet);
            font-weight: bold;
            font-size: 0.8rem;
        }

        .knot:hover { transform: scale(1.1); }

        /* Animation Classes */
        .untied .ribbon-left { transform: translateX(-100%); }
        .untied .ribbon-right { transform: translateX(100%); }
        .untied .knot { transform: scale(0); opacity: 0; }
    </style>
</head>
<body>

<div id="card">
    <div id="ribbon-container" onclick="untieRibbon()">
        <div class="ribbon-half ribbon-left"></div>
        <div class="knot">OPEN</div>
        <div class="ribbon-half ribbon-right"></div>
    </div>

    <div class="door left">FOR</div>
    <div class="door right">SIMPLE</div>

    <div id="stage">
        <div id="side-prompt">"make a wish and blow off the candles (click them)"</div>
        
        <div class="cake" id="cakeNode">
            <div class="frosting"></div>
            <div id="candle-container">
                <div class="candle" onclick="extinguish()"><div class="flame"></div><div class="fume"></div></div>
                <div class="candle" onclick="extinguish()"><div class="flame"></div><div class="fume"></div></div>
                <div class="candle" onclick="extinguish()"><div class="flame"></div><div class="fume"></div></div>
            </div>
        </div>

        <div id="eat-prompt" onclick="revealFinale()">eat my darling (click here)</div>
    </div>

    <div id="cloth">
        <h2 style="margin:0; letter-spacing: 2px;">HAPPY BIRTHDAY</h2>
        <h1 style="margin:0; font-size: 3.5rem; text-shadow: 2px 2px 10px rgba(0,0,0,0.5);">SIMPLE</h1>
        <div class="video-box">
            <video id="v1" src="GG2.mp4" loop></video>
            <video id="v2" src="GG3.mp4" loop></video>
        </div>
        <button id="replay-btn" onclick="location.reload()">Replay Card</button>
    </div>
</div>

<audio id="bdaySong" src="birthday.mp3"></audio>

<script>
    let musicStarted = false;

    function untieRibbon() {
        // 1. Untie the ribbon
        document.getElementById('ribbon-container').classList.add('untied');

        // 2. Wait for ribbon animation, then open the doors
        setTimeout(() => {
            document.getElementById('ribbon-container').style.display = 'none';
            openCard(); // Existing function to swing doors and start jasmine
        }, 800);
    }

    function openCard() {
        document.getElementById('card').classList.add('open');
        createJasmineShower();
    }

    function createJasmineShower() {
        for (let i = 0; i < 50; i++) {
            setTimeout(() => {
                const petal = document.createElement('div');
                petal.className = 'petal';
                const size = Math.random() * 20 + 10 + 'px';
                petal.style.width = size;
                petal.style.height = size;
                petal.style.left = Math.random() * 100 + 'vw';
                petal.style.top = '-50px';
                document.body.appendChild(petal);

                const duration = Math.random() * 4 + 3;
                petal.animate([
                    { transform: `translateY(0) rotate(0deg)`, opacity: 0.9 },
                    { transform: `translateY(110vh) rotate(${Math.random() * 720}deg)`, opacity: 0 }
                ], { duration: duration * 1000, easing: 'linear' });

                setTimeout(() => petal.remove(), duration * 1000);
            }, i * 100);
        }
    }

    function extinguish() {
        if (musicStarted) return;
        musicStarted = true;

        const candles = document.querySelectorAll('.candle');
        candles.forEach(c => c.classList.add('extinguished'));
        document.getElementById('side-prompt').style.opacity = '0';
        
        const audio = document.getElementById('bdaySong');
        audio.play().catch(() => alert("Click again to play music!"));

        // Show 'Eat my darling' after a short delay
        setTimeout(() => {
            document.getElementById('cakeNode').style.transform = "translateY(-30px) scale(1.1)";
            document.getElementById('eat-prompt').style.display = 'block';
        }, 4000);
    }

    function revealFinale() {
        document.getElementById('cloth').classList.add('roll-down');

        // Play both videos
        const v1 = document.getElementById('v1');
        const v2 = document.getElementById('v2');
        v1.play();
        v2.play();

        // Fade in the Replay Button after 10 seconds
        setTimeout(() => {
            const btn = document.getElementById('replay-btn');
            btn.style.opacity = '1';
            btn.style.pointerEvents = 'auto'; // Ensures the button is clickable
        }, 10000);
    }
</script>

</body>
</html>
